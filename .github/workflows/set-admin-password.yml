name: Set Admin Password

# Notfall-/Initial-Passwort-Reset für einen Admin (manuell ausgelöst).
# Passwort kommt aus dem Secret ADMIN_RESET_PASSWORD (wird in Logs maskiert).
on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Admin-E-Mail'
        required: true
        default: 'admin@easybrainlab.com'

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - name: Set password on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          ADMIN_EMAIL: ${{ github.event.inputs.email }}
          ADMIN_PW: ${{ secrets.ADMIN_RESET_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ADMIN_EMAIL,ADMIN_PW
          script: |
            set -e
            cd /opt/apps/forecast
            export GITHUB_REPOSITORY=easybrainlab/forecast
            docker compose -f docker-compose.prod.yml pull api
            docker compose -f docker-compose.prod.yml run --rm \
              -e SET_ADMIN_EMAIL="$ADMIN_EMAIL" \
              -e SET_ADMIN_PASSWORD="$ADMIN_PW" \
              api pnpm set-admin
