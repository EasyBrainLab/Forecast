# Lokale Entwicklung: Postgres + Mailpit (SMTP-Sink). API/Web laufen via pnpm dev.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: forecast
      POSTGRES_PASSWORD: forecast
      POSTGRES_DB: forecast_dev
    ports: ['5432:5432']
    volumes: ['pgdata_dev:/var/lib/postgresql/data']

  mailpit:
    image: axllent/mailpit:latest
    ports: ['1025:1025', '8025:8025'] # SMTP / Web-UI

volumes:
  pgdata_dev:
